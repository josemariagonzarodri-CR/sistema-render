<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Familiar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <style>
        :root {
            --bg-base: #0f172a; --bg-gradient-1: rgba(14, 165, 233, 0.12); --bg-gradient-2: rgba(71, 85, 105, 0.15); --bg-gradient-3: rgba(16, 185, 129, 0.08);
            --glass-bg: rgba(30, 41, 59, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #0ea5e9;
            --weekend-tint: rgba(239, 68, 68, 0.03); --weekend-border: rgba(239, 68, 68, 0.15);
            --shadow-premium: 0 10px 40px -10px rgba(0,0,0,0.5), 0 5px 20px -5px rgba(0,0,0,0.4);
            --modal-overlay: rgba(0, 0, 0, 0.6); --day-hover-bg: rgba(14, 165, 233, 0.05); --cell-bg: rgba(15, 23, 42, 0.4);
            --border-width-main: 1.5px; 
            --color-chema: #0ea5e9; --color-mel: #f43f5e; --color-bri: #8b5cf6; --color-bely: #10b981;  
            --prio-alta: #ef4444; --prio-media: #f59e0b; --prio-baja: #3b82f6;   
        }
        body.light-theme {
            --bg-base: #f1f5f9; --bg-gradient-1: rgba(14, 165, 233, 0.05); --bg-gradient-2: rgba(100, 116, 139, 0.05); --bg-gradient-3: rgba(16, 185, 129, 0.03);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(0, 0, 0, 0.1); --text-main: #334155; --text-muted: #64748b; --accent: #0284c7;
            --weekend-tint: rgba(239, 68, 68, 0.03); --weekend-border: rgba(239, 68, 68, 0.15);
            --shadow-premium: 0 10px 40px -10px rgba(0,0,0,0.06), 0 5px 20px -5px rgba(0,0,0,0.03);
            --modal-overlay: rgba(203, 213, 225, 0.6); --day-hover-bg: rgba(2, 132, 199, 0.04); --cell-bg: rgba(241, 245, 249, 0.6);
            --color-chema: #0284c7; --color-mel: #e11d48; --color-bri: #6d28d9; --color-bely: #059669;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--bg-base); background-image: radial-gradient(circle at 10% 40%, var(--bg-gradient-1), transparent 30%), radial-gradient(circle at 85% 20%, var(--bg-gradient-2), transparent 30%), radial-gradient(circle at 50% 80%, var(--bg-gradient-3), transparent 30%); color: var(--text-main); min-height: 100dvh; display: flex; justify-content: center; align-items: center; padding: 1rem; overflow-x: hidden; transition: background-color 0.4s ease, color 0.4s ease; }
        .app-container { width: 100%; max-width: 1600px; height: 92vh; position: relative; display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-premium); border: var(--border-width-main) solid var(--glass-border); }
        
        /* HEADER COLAPSABLE */
        .top-section { background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-bottom: var(--border-width-main) solid var(--glass-border); padding: 1rem 2rem 0 2rem; display: flex; flex-direction: column; z-index: 10; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;}
        .header-row h1 { font-size: 1.6rem; font-weight: 500; letter-spacing: -1px; }
        .controls-wrapper { display: flex; flex-direction: column; gap: 1rem; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 500px; opacity: 1; }
        .controls-wrapper.collapsed { max-height: 0; opacity: 0; }
        #btn-menu-toggle { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer; display: none; }
        
        .controls { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap;}
        .btn { background: var(--glass-bg); color: var(--text-main); border: var(--border-width-main) solid var(--glass-border); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 500; display: flex; align-items: center; justify-content: center;}
        .btn:hover { filter: brightness(1.1); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; }
        
        .tabs-nav { display: flex; gap: 1rem; overflow-x: auto; scrollbar-width: none; margin-top: 0.5rem;}
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.8rem 1.5rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; position: relative; transition: color 0.3s; white-space: nowrap;}
        .tab-btn.active { color: var(--accent); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: 3px 3px 0 0; }
        
        .main-content { flex: 1; position: relative; overflow: hidden; background: rgba(0,0,0,0.1); }
        .tab-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 1.5rem; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; overflow-y: auto;}
        .tab-content.active { opacity: 1; pointer-events: all; }
        
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 0 1rem;}
        .month-nav-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: grid; place-items: center; transition: all 0.2s; font-size: 1.2rem; flex-shrink: 0;}
        .current-month-title { font-size: 1.5rem; font-weight: 600; text-transform: capitalize; letter-spacing: -0.5px; text-align: center;}
        .grid-header { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 0.9fr 0.9fr; gap: 12px; margin-bottom: 8px; }
        .day-name { text-align: right; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; padding-right: 0.5rem; font-weight: 500; }
        .grid-body { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 0.9fr 0.9fr; grid-auto-rows: minmax(95px, 1fr); gap: 10px; flex: 1; overflow-y: auto; padding-right: 5px; }
        
        .day-cell { background: var(--cell-bg); border: var(--border-width-main) solid var(--glass-border); border-radius: 12px; padding: 4px 6px; display: flex; flex-direction: column; gap: 3px; transition: all 0.2s ease; position: relative; overflow: hidden;}
        .day-cell.weekend { background: var(--weekend-tint); border-color: var(--weekend-border); }
        .day-cell.weekend .day-number { color: #fca5a5; }
        .day-cell.empty { background: transparent; border-color: transparent; pointer-events: none; }
        .day-cell.today { border-color: var(--accent); background: rgba(14, 165, 233, 0.1); }
        .day-cell.today .day-number { background: var(--accent); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; }
        .day-number { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); align-self: flex-end; margin-bottom: 2px; line-height: 1;}
        
        .badge { font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; gap: 4px; border-left: 3px solid transparent; cursor: pointer; white-space: nowrap; height: 20px; flex-shrink: 0;}
        .badge.prio-Alta { border-left-color: var(--prio-alta); }
        .badge.prio-Media { border-left-color: var(--prio-media); }
        .badge.prio-Baja { border-left-color: var(--prio-baja); }
        
        .badge.medico { background: rgba(16, 185, 129, 0.15); color: #10b981; } 
        .badge.terapia { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; } 
        .badge.clases { background: rgba(245, 158, 11, 0.15); color: #f59e0b; } 
        .badge.trabajo { background: rgba(14, 165, 233, 0.15); color: #0ea5e9; } 
        .badge.gym { background: rgba(239, 68, 68, 0.15); color: #ef4444; } 
        .badge.descanso { background: rgba(100, 116, 139, 0.15); color: #94a3b8; } 
        .badge.rutina { background: rgba(236, 72, 153, 0.15); color: #ec4899; } 
        
        .badge-txt { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .badge-avatar { font-size: 0.55rem; font-weight: 600; opacity: 0.7; }

        .daily-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 0 1rem; }
        .daily-date { display: flex; align-items: center; gap: 0.8rem; font-size: 1.4rem; font-weight: 500; letter-spacing: -0.5px; flex-wrap: wrap;}
        .date-filter-input { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 16px; outline: none; cursor: pointer; text-align: center; width: 160px;}
        .agenda-list { display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; padding: 0 1rem 2rem 1rem; flex: 1; }
        .agenda-item { display: flex; gap: 1.5rem; align-items: center; transition: opacity 0.4s ease; }
        
        .agenda-time-col { min-width: 90px; text-align: right; display: flex; flex-direction: column; align-items: flex-end; padding-top: 4px;}
        .time-main { font-size: 1.05rem; font-weight: 600; color: var(--text-main); line-height: 1.1; white-space: nowrap;}
        .agenda-card { flex: 1; background: var(--cell-bg); border: var(--border-width-main) solid var(--glass-border); border-radius: 12px; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; position: relative; transition: all 0.3s ease; overflow: hidden; cursor: pointer; }
        .agenda-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--card-color, var(--text-muted)); }
        
        .friendly-checkbox { appearance: none; -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid var(--text-muted); cursor: pointer; position: relative; transition: all 0.3s; display: grid; place-items: center; flex-shrink: 0; }
        .friendly-checkbox::before { content: ""; width: 14px; height: 14px; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); transform: scale(0); background-color: white; transition: 0.2s transform; }
        .friendly-checkbox:checked { background-color: var(--card-color, var(--accent)); border-color: var(--card-color, var(--accent)); }
        .friendly-checkbox:checked::before { transform: scale(1); }
        
        .task-content { flex: 1; }
        .task-title { font-size: 1.05rem; font-weight: 500; margin-bottom: 2px; color: var(--text-main); }
        .task-desc { font-size: 0.8rem; color: var(--text-muted); }
        .prio-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase;}
        .prio-badge.Alta { background: rgba(239, 68, 68, 0.15); color: var(--prio-alta); border: 1px solid var(--prio-alta); }
        .prio-badge.Media { background: rgba(245, 158, 11, 0.15); color: var(--prio-media); border: 1px solid var(--prio-media); }
        .prio-badge.Baja { background: rgba(59, 130, 246, 0.15); color: var(--prio-baja); border: 1px solid var(--prio-baja); }
        .assignee-badge { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 50px; letter-spacing: 0.5px; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); display: flex; align-items: center; gap: 6px; border: 1px solid var(--glass-border); white-space: nowrap;}
        .assignee-badge::before { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: var(--card-color); }
        
        .agenda-item.completed { opacity: 0.4; }
        .agenda-item.completed .agenda-card { background: transparent; border-color: var(--glass-border); box-shadow: none; transform: none; }
        .agenda-item.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .agenda-item.completed .agenda-card::before { background: var(--text-muted); }
        
        .workload-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; padding: 1rem; }
        .workload-card { background: var(--cell-bg); border: var(--border-width-main) solid var(--glass-border); border-radius: 16px; padding: 1.5rem; text-align: center; position: relative; overflow: hidden;}
        .workload-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--user-color); }
        .wl-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-main); }
        .wl-metric { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--glass-border); }
        .wl-metric:last-child { border-bottom: none; }
        .wl-label { font-size: 0.85rem; color: var(--text-muted); }
        .wl-value { font-size: 1.1rem; font-weight: 700; color: var(--user-color); }
        
        /* MODALES FIJOS */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 9999; padding: 1rem;}
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--glass-bg); border: var(--border-width-main) solid var(--glass-border); border-radius: 16px; width: 480px; max-width: 100%; padding: 2rem; box-shadow: var(--shadow-premium); transform: translateY(20px); transition: transform 0.3s ease; max-height: 90vh; overflow-y: auto;}
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: var(--border-width-main) solid var(--glass-border); padding-bottom: 1rem;}
        .close-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; font-weight: 500; }
        .form-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 0.7rem; border-radius: 8px; outline: none; font-family: 'Poppins', sans-serif; font-size: 16px; }
        .form-control:focus { border-color: var(--accent); }
        .modal-footer { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .modal-footer button { flex: 1; }

        .more-badge { font-size: 0.65rem; color: var(--text-muted); text-align: center; margin-top: auto; padding: 2px; border-radius: 4px; transition: all 0.2s; }
        .dia-item-card { background: rgba(0,0,0,0.1); border-left: 4px solid var(--accent); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .flatpickr-input { font-family: 'Poppins', sans-serif !important; }
        select option { background: var(--bg-base); color: var(--text-main); }
        
        /* Estilo moderno y minimalista para el input de archivo */
        input[type="file"]::file-selector-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: 12px;
        }
        input[type="file"]::file-selector-button:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        
        /* PANTALLA LOGIN: Siempre visible hasta autenticar */
        #login-overlay { z-index: 10000; background: var(--bg-base); }

        @media (max-width: 1024px) {
            .workload-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-body { grid-auto-rows: minmax(80px, 1fr); gap: 6px; }
            .badge-txt { -webkit-line-clamp: 2; white-space: normal; display: -webkit-box; -webkit-box-orient: vertical; }
            .badge { height: auto; align-items: flex-start; }
            .badge-avatar { display: none; }
        }

        @media (max-width: 950px) {
            body { padding: 0; align-items: flex-start; min-height: 100dvh; }
            .app-container { height: auto; min-height: 100dvh; border-radius: 0; border: none; box-shadow: none; overflow: visible; }
            .main-content { overflow: visible; flex: none; height: auto; }
            .tab-content { position: relative; display: none; height: auto; padding: 1rem 0.5rem; }
            .tab-content.active { display: flex; }
            
            .top-section { padding: 1rem 1rem 0 1rem; position: sticky; top: 0; z-index: 50; }
            
            /* Menú Toggle visible en móviles */
            #btn-menu-toggle { display: block; }
            .controls-wrapper { position: absolute; top: 100%; left: 0; right: 0; background: var(--glass-bg); padding: 1rem; border-bottom: var(--border-width-main) solid var(--glass-border); backdrop-filter: blur(30px); }
            .controls { flex-direction: column; width: 100%; align-items: stretch; }
            #filtro-usuario-global { width: 100% !important; margin-bottom: 0.5rem;}
            .tabs-nav { margin-top: 1rem; }
            
            .grid-header { gap: 2px; }
            .day-name { font-size: 0.55rem; padding-right: 2px; text-align: center; }
            .grid-body { gap: 3px; padding-right: 0; grid-auto-rows: minmax(85px, 1fr); overflow-y: visible; }
            .day-cell { padding: 2px; border-radius: 6px; }
            .day-number { font-size: 0.75rem; }
            .badge { font-size: 0.5rem; padding: 2px; flex-direction: column; line-height: 1.1; margin-bottom: 1px;}
            
            .daily-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .daily-date { width: 100%; justify-content: space-between; }
            .agenda-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; background: rgba(0,0,0,0.15); padding: 12px; border-radius: 12px; }
            .agenda-time-col { flex-direction: row; width: 100%; justify-content: flex-start; align-items: baseline; gap: 8px; }
            .agenda-card { width: 100%; padding: 0.8rem; flex-wrap: wrap;}
            
            .workload-grid { grid-template-columns: 1fr; gap: 1rem; padding: 0 0.5rem;}
            form > div[style*="display: flex"] { flex-direction: column; gap: 0 !important; }
            .form-group { width: 100% !important; margin-bottom: 0.8rem;}
            .modal-content { padding: 1.5rem 1rem; margin-top: 2rem;}
            .modal-footer { flex-direction: column; }
            .modal-footer button { width: 100%; }
            .btn-danger { order: 2; }
        }
    </style>
</head>
<body>
    <div class="modal-overlay active" id="login-overlay">
        <div class="modal-content" style="width: 350px;">
            <h2 style="text-align:center; margin-bottom: 1.5rem;">🔑 Acceso Familiar</h2>
            <form id="form-login">
                <div class="form-group">
                    <label>Usuario</label>
                    <select id="login-user" class="form-control" required>
                        <option value="chema">Chema</option>
                        <option value="mel">Mel</option>
                        <option value="bri">Bri</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" class="form-control" required placeholder="Tu contraseña secreta">
                </div>
                <p id="login-error" style="color:#ef4444; font-size:0.85rem; text-align:center; display:none; margin-bottom: 1rem;"></p>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;" id="btn-login">Entrar Seguros</button>
            </form>
        </div>
    </div>

    <div class="app-container">
        <div class="top-section">
            <div class="header-row">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h1>Sistema Familiar</h1>
                    <span id="user-badge" style="font-size: 0.75rem; background: var(--accent); padding: 2px 8px; border-radius: 10px; color: white; display: none;"></span>
                </div>
                <button id="btn-menu-toggle" title="Ocultar/Mostrar Menú">▼ Menú</button>
                <button class="btn btn-danger" id="btn-logout" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; display: none;" title="Cerrar Sesión">Salir</button>
            </div>
            
            <div class="controls-wrapper" id="controls-wrapper">
                <div class="controls">
                    <select id="filtro-usuario-global" class="form-control" style="width: auto; padding: 0.4rem 1rem; height: auto;">
                        <option value="todos">👥 Todos los miembros</option>
                        <option value="chema">Chema</option>
                        <option value="mel">Mel</option>
                        <option value="bri">Bri</option>
                        <option value="bely">Bely</option>
                    </select>
                    <button class="btn" id="theme-toggle" title="Cambiar Tema">☀️/🌙</button>
                    <button class="btn btn-primary" id="btn-nuevo-global">+ Nuevo Registro</button>
                </div>
                <div class="tabs-nav">
                    <button class="tab-btn active" data-target="tab-calendar">📅 Calendario Maestro</button>
                    <button class="tab-btn" data-target="tab-daily">✅ Operación Diaria</button>
                    <button class="tab-btn" data-target="tab-carga">📊 Dashboard</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="tab-content active" id="tab-calendar">
                <div class="calendar-controls">
                    <button class="month-nav-btn" id="btn-prev-month">&lt;</button>
                    <h2 class="current-month-title" id="display-mes-anio">Cargando...</h2>
                    <button class="month-nav-btn" id="btn-next-month">&gt;</button>
                </div>
                <div class="grid-header">
                    <div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mié</div>
                    <div class="day-name">Jue</div><div class="day-name">Vie</div><div class="day-name" style="color: #fca5a5;">Sáb</div><div class="day-name" style="color: #fca5a5;">Dom</div>
                </div>
                <div class="grid-body" id="calendar-body"></div>
            </div>

            <div class="tab-content" id="tab-daily">
                <div class="daily-header">
                    <div class="daily-date">
                        Rutina para: 
                        <button class="month-nav-btn" id="btn-dia-anterior" style="width: 32px; height: 32px; font-size: 1rem;">&lt;</button>
                        <input type="text" id="filtro-fecha-tareas" class="date-filter-input" placeholder="📅 Elegir fecha">
                        <button class="month-nav-btn" id="btn-dia-siguiente" style="width: 32px; height: 32px; font-size: 1rem;">&gt;</button>
                    </div>
                </div>
                <div class="agenda-list" id="agenda-body">
                    <p style="text-align:center; color: var(--text-muted); margin-top: 2rem;">Cargando tareas...</p>
                </div>
            </div>

            <div class="tab-content" id="tab-carga">
                <h2 style="font-size: 1.4rem; font-weight: 500; margin-bottom: 1.5rem; text-align: center;">Métricas de Responsabilidad</h2>
                <div class="workload-grid" id="carga-body"></div>
            </div>
        </div>

        <div class="modal-overlay" id="form-tarea-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-tarea-titulo" style="font-size: 1.2rem; font-weight: 500;">Nueva Tarea</h2>
                    <button class="close-btn close-modal-btn">&times;</button>
                </div>
                <form id="form-tarea">
                    <input type="hidden" id="t-id">
                    <div class="form-group"><label>Título</label><input type="text" id="t-titulo" class="form-control" required placeholder="Ej. Dar de comer a Bely"></div>
                    <div class="form-group"><label>Detalles</label><input type="text" id="t-desc" class="form-control" placeholder="Ej. Dieta específica..."></div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;"><label>Fecha</label><input type="text" id="t-fecha" class="form-control" required placeholder="📅 Día"></div>
                        <div class="form-group" style="flex: 1;"><label>Inicio</label><input type="text" id="t-hora-inicio" class="form-control" required placeholder="⏰ Inicio"></div>
                        <div class="form-group" style="flex: 1;"><label>Fin</label><input type="text" id="t-hora-fin" class="form-control" placeholder="⏰ Fin (Opcional)"></div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;"><label>Prioridad</label><select id="t-prio" class="form-control" required><option value="Alta">Alta (Crítico)</option><option value="Media" selected>Media</option><option value="Baja">Baja</option></select></div>
                        <div class="form-group" style="flex: 1;"><label>Responsable</label><select id="t-resp" class="form-control" required><option value="chema" selected>Chema</option><option value="mel">Mel</option><option value="bri">Bri</option><option value="bely">Bely</option></select></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="btn-borrar-tarea" class="btn btn-danger" style="display: none;">Eliminar</button>
                        <button type="submit" class="btn btn-primary" id="btn-guardar-tarea">Guardar Tarea</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="modal-overlay" id="form-evento-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-evento-titulo" style="font-size: 1.2rem; font-weight: 500;">Nuevo Evento</h2>
                    <button class="close-btn close-modal-btn">&times;</button>
                </div>
                <form id="form-evento">
                    <input type="hidden" id="e-id">
                    <div class="form-group"><label>Título</label><input type="text" id="e-titulo" class="form-control" required placeholder="Ej. Clase de Matemáticas"></div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;"><label>Fecha Exacta</label><input type="text" id="e-fecha" class="form-control" required placeholder="📅 Día"></div>
                        <div class="form-group" style="flex: 1;"><label>Inicio</label><input type="text" id="e-hora-inicio" class="form-control" placeholder="⏰ Inicio"></div>
                        <div class="form-group" style="flex: 1;"><label>Fin</label><input type="text" id="e-hora-fin" class="form-control" placeholder="⏰ Fin (Opcional)"></div>
                    </div>

                    <div class="form-group"><label>Tipo</label><select id="e-tipo" class="form-control" required>
                        <option value="medico" selected>Cita Médica</option>
                        <option value="terapia">Terapia</option>
                        <option value="clases">Clases</option>
                        <option value="trabajo">Trabajo</option>
                        <option value="gym">Gym</option>
                        <option value="descanso">Descanso</option>
                        <option value="rutina">Rutina Especial</option>
                    </select></div>

                    <div class="form-group" id="container-archivo" style="display: none; background: rgba(14, 165, 233, 0.1); padding: 10px; border-radius: 8px; border: 1px dashed var(--accent);">
                        <label>🩺 Documento (Receta, PDF, Imagen)</label>
                        <input type="file" id="e-archivo" class="form-control" accept="image/*,.pdf" style="background: transparent; border: none; padding: 0;">
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;"><label>Prioridad</label><select id="e-prio" class="form-control" required><option value="Alta">Alta</option><option value="Media" selected>Media</option><option value="Baja">Baja</option></select></div>
                        <div class="form-group" style="flex: 1;"><label>Responsable</label><select id="e-resp" class="form-control" required><option value="chema" selected>Chema</option><option value="mel">Mel</option><option value="bri">Bri</option><option value="bely">Bely</option></select></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="btn-borrar-evento" class="btn btn-danger" style="display: none;">Eliminar</button>
                        <button type="submit" class="btn btn-primary" id="btn-guardar-evento">Guardar Evento</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="modal-overlay" id="detalle-dia-modal">
            <div class="modal-content" style="width: 500px;">
                <div class="modal-header">
                    <h2 id="modal-dia-titulo" style="font-size: 1.3rem; font-weight: 600;">Eventos del Día</h2>
                    <button class="close-btn close-modal-btn">&times;</button>
                </div>
                <div id="detalle-dia-contenido" style="max-height: 60vh; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 1rem;">
                </div>
            </div>
        </div>

    </div>
    <script>
        // --- 0. SEGURIDAD Y AUTENTICACIÓN ---
        const token = localStorage.getItem('token');
        const userRol = localStorage.getItem('rol');
        const userId = localStorage.getItem('id');

        if (!token) {
            document.getElementById('login-overlay').classList.add('active');
        } else {
            document.getElementById('login-overlay').classList.remove('active');
            document.getElementById('user-badge').innerText = `👤 ${userId.toUpperCase()}`;
            document.getElementById('user-badge').style.display = 'block';
            document.getElementById('btn-logout').style.display = 'block';
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            btn.innerText = 'Verificando...';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('rol', data.rol);
                localStorage.setItem('id', data.id);
                location.reload(); 
            } catch (err) {
                const errP = document.getElementById('login-error');
                errP.innerText = err.message;
                errP.style.display = 'block';
                btn.innerText = 'Entrar Seguros';
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });

        async function apiFetch(url, method, data) {
            const currentToken = localStorage.getItem('token');
            const res = await fetch(url, { 
                method: method, 
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken }, 
                body: JSON.stringify(data) 
            });
            const resData = await res.json();
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    if(resData.error && (resData.error.includes('expirada') || resData.error.includes('denegado'))) {
                        localStorage.clear();
                        location.reload();
                    }
                }
                throw new Error(resData.error || "Fallo servidor");
            }
            return resData;
        }

        // --- 1. MENÚ COLAPSABLE (MÓVILES) ---
        const btnMenu = document.getElementById('btn-menu-toggle');
        const wrapper = document.getElementById('controls-wrapper');
        btnMenu.addEventListener('click', () => {
            wrapper.classList.toggle('collapsed');
            btnMenu.innerText = wrapper.classList.contains('collapsed') ? '▶ Mostrar Menú' : '▼ Ocultar Menú';
        });

        // --- 2. CONFIGURACIÓN INICIAL ---
        const hoyGlobal = new Date();
        const offset = hoyGlobal.getTimezoneOffset() * 60000;
        const hoyString = new Date(hoyGlobal.getTime() - offset).toISOString().split('T')[0];
        
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
                if(window.innerWidth <= 950) wrapper.classList.add('collapsed'); 
            });
        });
        document.getElementById('theme-toggle').addEventListener('click', () => document.body.classList.toggle('light-theme'));

        document.getElementById('filtro-usuario-global').addEventListener('change', () => {
            renderCalendar(); renderAgenda();
        });

        const nombresRoles = { 'chema': 'Chema', 'mel': 'Mel', 'bri': 'Bri', 'bely': 'Bely' };
        const nombresMeses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        let globalTareas = []; let globalEventos = [];
        let currentMonth = hoyGlobal.getMonth(); let currentYear = hoyGlobal.getFullYear();

        let fpFiltroDiario, fpFechaTarea, fpHoraInicioTarea, fpHoraFinTarea, fpFechaEvento, fpHoraInicioEvento, fpHoraFinEvento; 

        // --- 3. MODALES CON SEGURIDAD VISUAL DE ROLES ---
        function abrirModalTarea(tarea = null) {
            const modal = document.getElementById('form-tarea-modal');
            document.getElementById('form-tarea').reset();
            const btnBorrar = document.getElementById('btn-borrar-tarea');
            
            const usrGlobal = document.getElementById('filtro-usuario-global').value;
            if (usrGlobal !== 'todos') document.getElementById('t-resp').value = usrGlobal;

            if (tarea) {
                document.getElementById('modal-tarea-titulo').textContent = "Editar Tarea";
                document.getElementById('t-id').value = tarea.id;
                document.getElementById('t-titulo').value = tarea.titulo;
                document.getElementById('t-desc').value = tarea.descripcion || '';
                fpFechaTarea.setDate(tarea.fecha || hoyString);
                
                let horaGuardada = tarea.hora || "";
                if (tarea.ampm && tarea.ampm.trim() !== "") horaGuardada += " " + tarea.ampm;
                let partesHora = horaGuardada.split(' - ');
                
                fpHoraInicioTarea.setDate(partesHora[0] || "", true, "h:i K"); 
                if(partesHora[1]) fpHoraFinTarea.setDate(partesHora[1], true, "h:i K");
                else fpHoraFinTarea.clear();

                document.getElementById('t-prio').value = tarea.prioridad;
                document.getElementById('t-resp').value = tarea.responsable_id;
                
                if (userRol === 'admin') btnBorrar.style.display = 'block';
                else btnBorrar.style.display = 'none';

            } else {
                document.getElementById('modal-tarea-titulo').textContent = "Nueva Tarea";
                document.getElementById('t-id').value = "";
                fpFechaTarea.setDate(document.getElementById('filtro-fecha-tareas').value || hoyString);
                fpHoraInicioTarea.clear(); fpHoraFinTarea.clear();
                btnBorrar.style.display = 'none';
            }
            modal.classList.add('active');
        }

        function abrirModalEvento(evento = null) {
            const modal = document.getElementById('form-evento-modal');
            document.getElementById('form-evento').reset();
            const btnBorrar = document.getElementById('btn-borrar-evento');

            // Limpiar input de archivo por defecto
            document.getElementById('e-archivo').value = '';
            document.getElementById('container-archivo').style.display = 'none';

            const usrGlobal = document.getElementById('filtro-usuario-global').value;
            if (usrGlobal !== 'todos') document.getElementById('e-resp').value = usrGlobal;

            if (evento) {
                document.getElementById('modal-evento-titulo').textContent = "Editar Evento";
                document.getElementById('e-id').value = evento.id;
                document.getElementById('e-titulo').value = evento.titulo;
                const mStr = String(evento.mes).padStart(2, '0');
                const dStr = String(evento.dia).padStart(2, '0');
                fpFechaEvento.setDate(`${evento.anio}-${mStr}-${dStr}`);
                
                let partesHora = (evento.hora || "").split(' - ');
                fpHoraInicioEvento.setDate(partesHora[0] || "", true, "h:i K");
                if(partesHora[1]) fpHoraFinEvento.setDate(partesHora[1], true, "h:i K");
                else fpHoraFinEvento.clear();

                document.getElementById('e-tipo').value = evento.tipo;
                document.getElementById('e-prio').value = evento.prioridad;
                document.getElementById('e-resp').value = evento.responsable_id;
                
                if (evento.tipo === 'medico') {
                    document.getElementById('container-archivo').style.display = 'block';
                }

                if (userRol === 'admin') btnBorrar.style.display = 'block';
                else btnBorrar.style.display = 'none';
            } else {
                document.getElementById('modal-evento-titulo').textContent = "Nuevo Evento";
                document.getElementById('e-id').value = "";
                fpFechaEvento.setDate(hoyString);
                fpHoraInicioEvento.clear(); fpHoraFinEvento.clear();
                btnBorrar.style.display = 'none';
                
                if (document.getElementById('e-tipo').value === 'medico') {
                    document.getElementById('container-archivo').style.display = 'block';
                }
            }
            modal.classList.add('active');
        }

        // Lógica para mostrar/ocultar carga de archivos
        document.getElementById('e-tipo').addEventListener('change', (e) => {
            const container = document.getElementById('container-archivo');
            if (e.target.value === 'medico') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
                document.getElementById('e-archivo').value = ''; 
            }
        });

        document.querySelectorAll('.close-modal-btn').forEach(btn => btn.addEventListener('click', (e) => e.target.closest('.modal-overlay').classList.remove('active')));
        document.getElementById('btn-nuevo-global').addEventListener('click', () => {
            if (document.querySelector('.tab-content.active').id === 'tab-daily') abrirModalTarea(); 
            else abrirModalEvento();
        });

        // --- 4. CALENDARIO MAESTRO ---
        document.getElementById('btn-prev-month').addEventListener('click', () => cambiarMes(-1));
        document.getElementById('btn-next-month').addEventListener('click', () => cambiarMes(1));

        function cambiarMes(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        function renderCalendar() {
            document.getElementById('display-mes-anio').innerHTML = `${nombresMeses[currentMonth]} <span>${currentYear}</span>`;
            const gridBody = document.getElementById('calendar-body');
            gridBody.innerHTML = '';

            const primerDiaDelMes = new Date(currentYear, currentMonth, 1).getDay();
            const diasEnElMes = new Date(currentYear, currentMonth + 1, 0).getDate();
            let inicioCelda = primerDiaDelMes === 0 ? 6 : primerDiaDelMes - 1;

            const usrGlobal = document.getElementById('filtro-usuario-global').value;
            let eventosMes = globalEventos.filter(ev => parseInt(ev.mes, 10) === (currentMonth + 1) && parseInt(ev.anio, 10) === currentYear);
            if (usrGlobal !== 'todos') eventosMes = eventosMes.filter(ev => ev.responsable_id === usrGlobal);

            const eventosPorDia = {};
            eventosMes.forEach(ev => {
                const dInt = parseInt(ev.dia, 10);
                if(!eventosPorDia[dInt]) eventosPorDia[dInt] = [];
                eventosPorDia[dInt].push(ev);
            });

            for(let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (i % 7 === 5 || i % 7 === 6) cell.classList.add('weekend');

                if (i < inicioCelda || i >= inicioCelda + diasEnElMes) {
                    cell.classList.add('empty');
                } else {
                    const numDia = i - inicioCelda + 1;
                    if (numDia === hoyGlobal.getDate() && currentMonth === hoyGlobal.getMonth() && currentYear === hoyGlobal.getFullYear()) cell.classList.add('today');
                    
                    cell.innerHTML = `<div class="day-number">${numDia}</div>`;
                    cell.style.cursor = 'pointer';
                    cell.onclick = () => abrirDetalleDia(numDia, currentMonth, currentYear);

                    if (eventosPorDia[numDia]) {
                        const pMap = { 'Alta': 1, 'Media': 2, 'Baja': 3 };
                        const eventosOrdenados = eventosPorDia[numDia].sort((a, b) => (pMap[a.prioridad] || 2) - (pMap[b.prioridad] || 2));
                        const maxVisibles = 2;
                        const visibles = eventosOrdenados.slice(0, maxVisibles);
                        const ocultos = eventosOrdenados.length - maxVisibles;

                        visibles.forEach(evt => {
                            const tag = document.createElement('div');
                            tag.className = `badge ${evt.tipo} prio-${evt.prioridad || 'Media'}`;
                            let soloInicio = (evt.hora || "").split(' - ')[0];
                            tag.innerHTML = `<span class="badge-txt"><strong>${soloInicio ? soloInicio + ' ' : ''}</strong>${evt.titulo}</span><span class="badge-avatar">${evt.responsable_nombre}</span>`; 
                            tag.onclick = (e) => { e.stopPropagation(); abrirModalEvento(evt); };
                            cell.appendChild(tag);
                        });

                        if (ocultos > 0) {
                            const moreTag = document.createElement('div');
                            moreTag.className = 'more-badge';
                            moreTag.innerText = `+${ocultos}`;
                            cell.appendChild(moreTag);
                        }
                    }
                }
                gridBody.appendChild(cell);
            }
        }

        // --- 5. OPERACIÓN DIARIA ---
        const agendaBody = document.getElementById('agenda-body');
        document.getElementById('btn-dia-anterior').addEventListener('click', () => cambiarDia(-1));
        document.getElementById('btn-dia-siguiente').addEventListener('click', () => cambiarDia(1));

        function cambiarDia(delta) {
            let actual = fpFiltroDiario.selectedDates[0] || new Date();
            actual.setDate(actual.getDate() + delta);
            fpFiltroDiario.setDate(actual);
            renderAgenda();
        }

        function renderAgenda() {
            agendaBody.innerHTML = '';
            const fSel = document.getElementById('filtro-fecha-tareas').value;
            const usrGlobal = document.getElementById('filtro-usuario-global').value;
            let tDia = globalTareas.filter(t => t.fecha === fSel || !t.fecha); 
            if (usrGlobal !== 'todos') tDia = tDia.filter(t => t.responsable_id === usrGlobal);

            if(tDia.length === 0) { 
                agendaBody.innerHTML = `<p style="text-align:center; margin-top: 3rem;">Día libre de tareas ${usrGlobal !== 'todos' ? 'para este usuario' : ''}. 🎉</p>`; 
                return; 
            }
            
            const pMap = { 'Alta': 1, 'Media': 2, 'Baja': 3 };
            tDia.sort((a, b) => (pMap[a.prioridad] || 2) - (pMap[b.prioridad] || 2)).forEach(task => {
                const item = document.createElement('div');
                item.className = `agenda-item ${task.completada ? 'completed' : ''}`;
                
                let hFull = task.hora || "";
                if (task.ampm && task.ampm.trim() !== "") hFull += " " + task.ampm;
                let partes = hFull.split(' - ');
                let txtInicio = partes[0] || "";
                let txtFin = partes[1] ? `<br><span style="font-size:0.75rem; color:var(--text-muted); font-weight:400;">hasta ${partes[1]}</span>` : "";

                item.innerHTML = `
                    <div class="agenda-time-col">
                        <span class="time-main">${txtInicio}</span>
                        ${txtFin}
                    </div>
                    <div class="agenda-card" style="--card-color: var(--color-${task.responsable_id});">
                        <input type="checkbox" class="friendly-checkbox" ${task.completada ? 'checked' : ''} onchange="toggleTask(event, this, ${task.id})">
                        <div class="task-content" onclick='abrirModalTarea(${JSON.stringify(task).replace(/'/g, "&#39;")})'>
                            <div style="display:flex; gap: 8px; align-items: center;"><div class="task-title">${task.titulo}</div><span class="prio-badge ${task.prioridad || 'Media'}">${task.prioridad || 'Media'}</span></div>
                            <div class="task-desc">${task.descripcion || ''}</div>
                        </div>
                        <div class="assignee-badge">${task.responsable_nombre}</div>
                    </div>`;
                agendaBody.appendChild(item);
            });
        }

        window.toggleTask = async function(e, checkbox, id) {
            e.stopPropagation(); 
            const completada = checkbox.checked;
            const t = globalTareas.find(x => x.id === id);
            if(t) t.completada = completada ? 1 : 0;
            renderAgenda(); calcularCarga();
            try { await apiFetch('/api/tareas', 'PUT', { id: id, completada: completada }); } 
            catch (error) { alert("Fallo de red al sincronizar check."); }
        };

        // --- 6. GUARDADO AL SERVIDOR ---
        document.getElementById('form-tarea').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('btn-guardar-tarea').textContent = "Guardando...";
            
            let vInicio = document.getElementById('t-hora-inicio').value;
            let vFin = document.getElementById('t-hora-fin').value;
            let horaCompleta = vInicio + (vFin ? ' - ' + vFin : '');

            const data = {
                titulo: document.getElementById('t-titulo').value, descripcion: document.getElementById('t-desc').value,
                fecha: document.getElementById('t-fecha').value, hora: horaCompleta, ampm: "",
                responsable_id: document.getElementById('t-resp').value, responsable_nombre: nombresRoles[document.getElementById('t-resp').value], prioridad: document.getElementById('t-prio').value
            };
            const id = document.getElementById('t-id').value;
            try {
                if(id) { data.id = id; await apiFetch('/api/tareas', 'PUT', data); } else { await apiFetch('/api/tareas', 'POST', data); }
                document.getElementById('form-tarea-modal').classList.remove('active');
                fpFiltroDiario.setDate(data.fecha);
                await pullTareas();
            } catch (err) { alert(err.message); }
            document.getElementById('btn-guardar-tarea').textContent = "Guardar Tarea";
        });

        // FIX: Extraer el día, mes y año directamente del objeto del calendario
        document.getElementById('form-evento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-evento');
            btn.textContent = "Guardando...";
            
            let vInicio = document.getElementById('e-hora-inicio').value;
            let vFin = document.getElementById('e-hora-fin').value;
            let horaCompleta = vInicio + (vFin ? ' - ' + vFin : '');
            
            const fechaObj = fpFechaEvento.selectedDates[0] || new Date();

            const formData = new FormData();
            formData.append('dia', fechaObj.getDate());
            formData.append('mes', fechaObj.getMonth() + 1);
            formData.append('anio', fechaObj.getFullYear());
            formData.append('titulo', document.getElementById('e-titulo').value);
            formData.append('tipo', document.getElementById('e-tipo').value);
            formData.append('hora', horaCompleta);
            formData.append('responsable_id', document.getElementById('e-resp').value);
            formData.append('responsable_nombre', nombresRoles[document.getElementById('e-resp').value]);
            formData.append('prioridad', document.getElementById('e-prio').value);

            const id = document.getElementById('e-id').value;
            if (id) formData.append('id', id);

            const archivoInput = document.getElementById('e-archivo');
            if (archivoInput.files.length > 0) {
                formData.append('archivo', archivoInput.files[0]);
            }

            try {
                const currentToken = localStorage.getItem('token');
                const url = id ? '/api/eventos' : '/api/eventos'; 
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': 'Bearer ' + currentToken },
                    body: formData 
                });

                const data = await res.json();
                if (!res.ok) {
                    if (res.status === 401 || res.status === 403) {
                        localStorage.clear(); location.reload();
                    }
                    throw new Error(data.error || "Fallo servidor");
                }

                document.getElementById('form-evento-modal').classList.remove('active');
                currentMonth = fechaObj.getMonth(); 
                currentYear = fechaObj.getFullYear();
                await pullEventos();
            } catch (err) { alert(err.message); }
            btn.textContent = "Guardar Evento";
        });

        document.getElementById('btn-borrar-tarea').addEventListener('click', async () => {
            if(!confirm("¿Eliminar tarea?")) return;
            try {
                await apiFetch('/api/tareas', 'DELETE', {id: document.getElementById('t-id').value});
                document.getElementById('form-tarea-modal').classList.remove('active'); await pullTareas();
            } catch (err) { alert(err.message); }
        });

        document.getElementById('btn-borrar-evento').addEventListener('click', async () => {
            if(!confirm("¿Eliminar evento?")) return;
            try {
                await apiFetch('/api/eventos', 'DELETE', {id: document.getElementById('e-id').value});
                document.getElementById('form-evento-modal').classList.remove('active'); await pullEventos();
            } catch (err) { alert(err.message); }
        });

        // --- 7. LECTURA Y DASHBOARD ---
        async function pullTareas() {
            if(!token) return; 
            try {
                const res = await apiFetch('/api/tareas?nocache=' + Date.now(), 'GET');
                globalTareas = res; renderAgenda(); calcularCarga();
            } catch (e) { agendaBody.innerHTML = `<p style="text-align:center; color:#ef4444;">Error al cargar tareas.</p>`; }
        }

        async function pullEventos() {
            if(!token) return; 
            try {
                const res = await apiFetch('/api/eventos?nocache=' + Date.now(), 'GET');
                globalEventos = res; renderCalendar(); calcularCarga();
            } catch (e) { console.error("Falla de API eventos:", e.message); }
        }

        function calcularCarga() {
            const cBody = document.getElementById('carga-body'); cBody.innerHTML = '';
            const s = { chema: {n:'Chema', tP:0, tA:0, e:0}, mel: {n:'Mel', tP:0, tA:0, e:0}, bri: {n:'Bri', tP:0, tA:0, e:0}, bely: {n:'Bely', tP:0, tA:0, e:0} };
            globalTareas.filter(t => t.fecha === document.getElementById('filtro-fecha-tareas').value || !t.fecha).forEach(t => {
                if(s[t.responsable_id] && !t.completada) { s[t.responsable_id].tP++; if(t.prioridad === 'Alta') s[t.responsable_id].tA++; }
            });
            globalEventos.filter(ev => parseInt(ev.mes, 10) === (currentMonth + 1) && parseInt(ev.anio, 10) === currentYear).forEach(ev => {
                if(s[ev.responsable_id]) s[ev.responsable_id].e++;
            });
            Object.keys(s).forEach(id => {
                const card = document.createElement('div'); card.className = 'workload-card'; card.style.setProperty('--user-color', `var(--color-${id})`);
                card.innerHTML = `<div class="wl-name">${s[id].n}</div><div class="wl-metric"><span class="wl-label">Eventos Mes</span><span class="wl-value">${s[id].e}</span></div><div class="wl-metric"><span class="wl-label">Tareas Día</span><span class="wl-value">${s[id].tP}</span></div><div class="wl-metric"><span class="wl-label" style="color:var(--prio-alta);">Críticas</span><span class="wl-value" style="color:var(--prio-alta);">${s[id].tA}</span></div>`;
                cBody.appendChild(card);
            });
        }

        function abrirDetalleDia(dia, mes, anio) {
            const modal = document.getElementById('detalle-dia-modal');
            const contenedor = document.getElementById('detalle-dia-contenido');
            document.getElementById('modal-dia-titulo').innerHTML = `Eventos: ${dia} de ${nombresMeses[mes]} ${anio}`;
            contenedor.innerHTML = '';

            const usrGlobal = document.getElementById('filtro-usuario-global').value;
            let evtsDia = globalEventos.filter(ev => parseInt(ev.dia, 10) === dia && parseInt(ev.mes, 10) === (mes + 1) && parseInt(ev.anio, 10) === anio);
            if (usrGlobal !== 'todos') evtsDia = evtsDia.filter(ev => ev.responsable_id === usrGlobal);

            if (evtsDia.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top: 2rem;">Día libre de eventos.</p>';
            } else {
                evtsDia.forEach(evt => {
                    let tiempo = evt.hora ? evt.hora.replace(' - ', ' a ') : 'Todo el día';
                    
                    let btnArchivo = evt.archivo_url 
                        ? `<a href="${evt.archivo_url}" target="_blank" class="btn" style="padding: 4px 10px; font-size: 0.75rem; background: var(--accent); color: white; border:none; text-decoration: none; margin-top: 8px; display: inline-block;" onclick="event.stopPropagation()">📄 Ver Documento</a>` 
                        : '';

                    const evtJson = JSON.stringify(evt).replace(/'/g, "&#39;");

                    contenedor.innerHTML += `
                    <div class="dia-item-card" style="border-color: var(--color-${evt.responsable_id}); cursor: pointer; transition: background 0.2s ease;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='rgba(0,0,0,0.1)'" onclick='abrirModalEvento(${evtJson}); document.getElementById("detalle-dia-modal").classList.remove("active");'>
                        <div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">EVENTO • ${tiempo}</div>
                            <div style="font-weight: 500;">${evt.titulo}</div>
                            ${btnArchivo}
                        </div>
                        <div class="assignee-badge" style="--card-color: var(--color-${evt.responsable_id});">${evt.responsable_nombre}</div>
                    </div>`;
                });
            }
            modal.classList.add('active');
        }

        // --- 8. INICIALIZAR RELOJES ---
        const configFecha = { locale: "es", dateFormat: "Y-m-d", altInput: true, altFormat: "d M, Y", disableMobile: false };
        const configHora = { enableTime: true, noCalendar: true, dateFormat: "h:i K", minuteIncrement: 5, disableMobile: false }; 
        
        fpFiltroDiario = flatpickr("#filtro-fecha-tareas", { ...configFecha, onChange: function() { renderAgenda(); }});
        fpFiltroDiario.setDate(hoyString);

        fpFechaTarea = flatpickr("#t-fecha", configFecha);
        fpFechaEvento = flatpickr("#e-fecha", configFecha);

        fpHoraInicioTarea = flatpickr("#t-hora-inicio", configHora);
        fpHoraFinTarea = flatpickr("#t-hora-fin", configHora);
        fpHoraInicioEvento = flatpickr("#e-hora-inicio", configHora);
        fpHoraFinEvento = flatpickr("#e-hora-fin", configHora);

        if(token) {
            pullTareas();
            pullEventos();
        }
    </script>
</body>
</html>
